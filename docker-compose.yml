services:
  loadbalancer:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

  api:
    build: ./app
    deploy:
      replicas: 2
    environment:
      - REDIS_HOST=redis
      - DB_HOST=db
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASS=postgres
    depends_on:
      - redis
      - db

  redis:
    image: redis:alpine

  db:
    build: ./init_db
    command: ["postgres", "-c", "max_connections=500"]
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - ./pantheon.xlsx:/docker-entrypoint-initdb.d/pantheon.xlsx
