services:
  loadbalancer:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

  api:
    build: ./app
    deploy:
      replicas: 4
    environment:
      - REDIS_HOST=redis
      - DB_HOST=db
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASS=postgres
    depends_on:
      - redis
      - db

  redis:
    image: redis:alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--maxclients", "10000", "--tcp-backlog", "511"]

  db:
    build: ./init_db
    command: ["postgres", "-c", "max_connections=2000", "-c", "shared_buffers=256MB"]
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - ./pantheon.xlsx:/docker-entrypoint-initdb.d/pantheon.xlsx

